services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml